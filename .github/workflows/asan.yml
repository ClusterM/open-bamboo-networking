# Windows MSVC AddressSanitizer repro for the agent-startup heap corruption
# (exception 0xc0000374). Builds ONLY the plugin's own sources + the
# startup_selftest harness with /fsanitize=address (OBN_ASAN=ON), then runs the
# harness under ASAN with an EMPTY config dir (no credentials, no cloud) so the
# Windows-only startup code (lan_tls SetEnvironmentVariableA/_putenv_s/
# GetEnvironmentVariableA, registry_set_config_dir, write_state_file; config
# Windows paths; os_compat winsock_init/localtime_s) is exercised with
# byte-precise heap checking on the REAL MSVC STL/CRT — which Wine page-heap
# cannot provide.
#
# Single version (fast); diagnostic only. If ASAN fires, the captured report
# names the exact faulting allocation/free + stack.

name: Windows ASAN repro

on:
  workflow_dispatch:
  push:
    paths:
      - 'tools/startup_selftest/**'
      - '.github/workflows/asan.yml'
      - 'CMakeLists.txt'
      - 'src/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asan-windows:
    name: win-asan-startup
    runs-on: windows-2022
    env:
      ABI_VERSION: "02.07.01"   # single ABI; keep the job fast

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure (OBN_ASAN=ON)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $staging = Join-Path $env:GITHUB_WORKSPACE "install"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          .\configure.ps1 `
            -ClientType bambu_studio `
            -WithVersion "$env:ABI_VERSION.99" `
            -Prefix $staging `
            -PatchConf:$false `
            -RegisterDShowFilter:$false `
            -EnableTests:$false `
            -CMakeArg '-DOBN_ASAN=ON'

      - name: Build (plugin + startup_selftest, ASAN-instrumented)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cmake --build build --config Release --target bambu_networking --parallel
          cmake --build build --config Release --target startup_selftest --parallel

      - name: Locate ASAN runtime + built binaries
        id: locate
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # The ASAN runtime (clang_rt.asan_dynamic-x86_64.dll) ships with the
          # MSVC toolchain; it must sit next to the exe / be on PATH at runtime.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsroot  = & $vswhere -latest -property installationPath
          $asan = Get-ChildItem -Path (Join-Path $vsroot 'VC\Tools\MSVC') `
            -Recurse -Filter 'clang_rt.asan_dynamic-x86_64.dll' -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $asan) { Write-Error "ASAN runtime DLL not found under $vsroot" }
          Write-Host "ASAN runtime: $($asan.FullName)"

          $dll = Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE 'build') `
            -Recurse -Filter 'bambu_networking*.dll' -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notlike '*BambuSource*' } | Select-Object -First 1
          $exe = Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE 'build') `
            -Recurse -Filter 'startup_selftest.exe' -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $dll) { Write-Error "bambu_networking dll not found" }
          if (-not $exe) { Write-Error "startup_selftest.exe not found" }
          Write-Host "DLL: $($dll.FullName)"
          Write-Host "EXE: $($exe.FullName)"

          # Copy the ASAN runtime next to the exe so it loads at startup.
          Copy-Item -Path $asan.FullName -Destination $exe.Directory.FullName -Force

          "asan_dir=$($exe.Directory.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "dll=$($dll.FullName)"                | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "exe=$($exe.FullName)"                | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Run startup_selftest under ASAN (empty + cached-login)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # A real (self-signed) PEM so mosquitto_tls_set() actually accepts it
          # on Windows and the suspect OpenSSL/mosquitto TLS setup + handshake
          # code runs (an empty/garbage cert makes the plugin bail before the
          # handshake). Generated with the runner's openssl.
          $cert = Join-Path $env:GITHUB_WORKSPACE 'cert'
          New-Item -ItemType Directory -Force -Path $cert | Out-Null
          $pem = Join-Path $cert 'slicer_base64.cer'
          & openssl req -x509 -newkey rsa:2048 -nodes -keyout (Join-Path $cert 'k.pem') `
            -out $pem -days 3650 -subj "/CN=selftest" 2>$null
          if (-not (Test-Path $pem)) { Write-Error "failed to generate test cert" }
          Write-Host "test cert at $pem"

          # windows_hook_rtl_allocators: also intercept Win32 HeapAlloc/
          # RtlAllocateHeap (CRT new/malloc are intercepted by default).
          # exitcode=99 so a non-abort ASAN error path is still distinguishable.
          $env:ASAN_OPTIONS = 'windows_hook_rtl_allocators=true:abort_on_error=1:exitcode=99:print_stats=0'
          # ASAN runtime is next to the exe (copied above); also add its dir to PATH.
          $env:PATH = "${{ steps.locate.outputs.asan_dir }};$env:PATH"

          $dll = "${{ steps.locate.outputs.dll }}"
          $exe = "${{ steps.locate.outputs.exe }}"

          # ---- Run 1: EMPTY config (Windows-only basic startup, no cloud) ----
          $empty = Join-Path $env:GITHUB_WORKSPACE 'empty_cfg'
          New-Item -ItemType Directory -Force -Path $empty | Out-Null
          Write-Host "=== RUN 1: EMPTY config (no creds, no cloud) ==="
          & $exe $dll $empty $cert
          $code1 = $LASTEXITCODE
          Write-Host "=== RUN 1 exit code: $code1 ==="

          # ---- Run 2: cached-login config (forces start()->connect_cloud->
          #      Windows TLS setup in cloud_session.cpp + mqtt_client). A DUMMY
          #      token is enough: user_logged_in() only needs a non-empty token
          #      + future expiry; the Windows TLS SETUP + handshake run before
          #      the MQTT CONNECT is auth-rejected. No real credentials needed.
          $login = Join-Path $env:GITHUB_WORKSPACE 'login_cfg'
          New-Item -ItemType Directory -Force -Path $login | Out-Null
          # Single-quoted PS string: the JSON's double-quotes pass through
          # verbatim (avoids a here-string, whose closing '@ must sit at
          # column 0 and would break the YAML block-scalar indentation).
          $auth = '{"region":"GLOBAL","account":"test@example.com","access_token":"DUMMYTOKENDUMMYTOKENDUMMYTOKEN0123456789","refresh_token":"","expires_at":"2027-12-31T00:00:00Z","user_id":"1468414750","user_name":"t","nick_name":"t","avatar":""}'
          Set-Content -Path (Join-Path $login 'obn.auth.json') -Value $auth -NoNewline
          Set-Content -Path (Join-Path $login 'obn.conf')      -Value "block_cloud=0" -NoNewline
          Write-Host "=== RUN 2: cached-login config (start->connect_cloud TLS path) ==="
          & $exe $dll $login $cert
          $code2 = $LASTEXITCODE
          Write-Host "=== RUN 2 exit code: $code2 ==="

          if ($code1 -ne 0 -or $code2 -ne 0) {
            Write-Error "startup_selftest fired ASAN (empty=$code1 login=$code2) — see report(s) above"
          } else {
            Write-Host "BOTH runs clean under ASAN (RTL allocator hooking enabled)."
          }

      - name: Upload ASAN-instrumented binaries (for offline debugging)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: win-asan-binaries
          path: |
            build/**/bambu_networking*.dll
            build/**/bambu_networking*.pdb
            build/**/startup_selftest.exe
            build/**/startup_selftest.pdb
          if-no-files-found: warn
